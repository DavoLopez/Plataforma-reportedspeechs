<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastering Reported Speech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .rounded-card { border-radius: 1.5rem; }
        .gradient-bg { background: linear-gradient(135deg, #f0f4ff 0%, #ffffff 100%); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans pb-12">

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [activeSection, setActiveSection] = useState('tense');

            const navItems = [
                { id: 'tense', label: '1. Backshifting' },
                { id: 'saytell', label: '2. Say vs Tell' },
                { id: 'time', label: '3. Time & Place' },
                { id: 'pronouns', label: '4. Pronouns' },
                { id: 'questions', label: '5. Reported Questions' },
                { id: 'practice', label: 'Práctica' }
            ];

            return (
                <div className="max-w-5xl mx-auto p-4 md:p-8">
                    <header className="mb-8 text-center">
                        <h1 className="text-4xl font-extrabold text-indigo-700 mb-2">Reported Speech Academy</h1>
                        <p className="text-lg text-slate-600">Dominando el arte de contar lo que otros dijeron.</p>
                    </header>

                    <nav className="flex flex-wrap gap-2 mb-8 justify-center">
                        {navItems.map((item) => (
                            <button
                                key={item.id}
                                onClick={() => setActiveSection(item.id)}
                                className={`px-4 py-2 rounded-full font-medium transition-all ${
                                    activeSection === item.id 
                                    ? 'bg-indigo-600 text-white shadow-lg' 
                                    : 'bg-white text-slate-600 border border-slate-200 hover:border-indigo-300'
                                }`}
                            >
                                {item.label}
                            </button>
                        ))}
                    </nav>

                    <main className="min-h-[500px]">
                        {activeSection === 'tense' && <TenseChanges />}
                        {activeSection === 'saytell' && <SayTellSection />}
                        {activeSection === 'time' && <TimeExpressions />}
                        {activeSection === 'pronouns' && <PronounsSection />}
                        {activeSection === 'questions' && <ReportedQuestions />}
                        {activeSection === 'practice' && <PracticeSection />}
                    </main>
                </div>
            );
        };

        const TenseChanges = () => {
            const tenseData = [
                { direct: "I want a holiday", reported: "She told me she wanted a holiday", explanation: "Present Simple → Past Simple" },
                { direct: "Bob is annoying me", reported: "Jane said Bob was annoying her", explanation: "Present Continuous → Past Continuous" },
                { direct: "I have eaten too much", reported: "He said he had eaten too much", explanation: "Present Perfect → Past Perfect" },
                { direct: "The class has been interesting", reported: "Anne said the class had been interesting", explanation: "Present Perfect Continuous → Past Perfect Continuous" },
                { direct: "I saw her arrive", reported: "He told me he had seen her arrive", explanation: "Past Simple → Past Perfect" },
                { direct: "The team were playing well", reported: "John said the team had been playing well", explanation: "Past Continuous → Past Perfect Continuous" },
                { direct: "I had arrived before 9am", reported: "She said she had arrived before 9am", explanation: "Past Perfect → No change" },
                { direct: "We had already been dating for 3 years", reported: "Mick told me they had already been dating for 3 years", explanation: "Past Perfect Continuous → No change" },
                { direct: "I will take you out tonight", reported: "He said he would take me out tonight", explanation: "Will → Would" },
                { direct: "I can easily pass the test", reported: "She said she could easily pass the test", explanation: "Can → Could" },
                { direct: "You must leave immediately", reported: "He told me I had to leave immediately", explanation: "Must → Had to" },
                { direct: "We may go out later", reported: "She said they might go out later", explanation: "May → Might" },
                { direct: "You ought to come at 7pm", reported: "He told me I ought to come at 7pm", explanation: "Ought to → No change" },
                { direct: "I should have helped you", reported: "He said he should have helped me", explanation: "Should → No change" },
                { direct: "I would walk the dog at night", reported: "She said she would walk the dog at night", explanation: "Would → No change" },
                { direct: "You couldn't do it", reported: "He told me I couldn't do it", explanation: "Could → No change" },
                { direct: "I might arrive late", reported: "He said he might arrive late", explanation: "Might → No change" }
            ];

            return (
                <section>
                    <h2 className="text-2xl font-bold mb-6 text-indigo-600">1. Backshifting: Cambio de tiempos</h2>
                    <div className="grid gap-4">
                        {tenseData.map((item, idx) => (
                            <div key={idx} className="p-4 bg-white rounded-card border border-slate-200 shadow-sm">
                                <div className="grid md:grid-cols-2 gap-4">
                                    <div><span className="font-bold text-xs uppercase text-indigo-400">Direct:</span> <p className="font-medium">"{item.direct}"</p></div>
                                    <div><span className="font-bold text-xs uppercase text-indigo-400">Reported:</span> <p className="font-medium text-indigo-900">{item.reported}</p></div>
                                </div>
                                <div className="mt-3 text-sm text-indigo-700 bg-indigo-50 p-2 rounded-lg italic">➜ {item.explanation}</div>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

        const SayTellSection = () => (
            <section className="space-y-8">
                <div className="bg-white p-8 rounded-card shadow-sm border border-slate-200">
                    <h2 className="text-2xl font-bold mb-6 text-indigo-600">Reporting Verbs: Say & Tell</h2>
                    <p className="mb-6 text-slate-600">
                        Usamos <strong>said</strong> (pasado de say) y <strong>told</strong> (pasado de tell). <br/>
                        - <strong>Said:</strong> No requiere un objeto personal directo (no decimos "He said me").<br/>
                        - <strong>Told:</strong> SIEMPRE lleva un objeto personal (ej: <em>me, him, her, us, them</em>).<br/>
                        Puedes usar <strong>that</strong> de manera opcional para introducir el reporte.
                    </p>
                    
                    <div className="grid md:grid-cols-2 gap-8">
                        <div className="p-6 bg-slate-50 rounded-xl border border-slate-200">
                            <h3 className="font-bold text-lg mb-4 text-indigo-800">Say (No objeto)</h3>
                            <ul className="space-y-3 text-sm text-slate-700">
                                <li>"I am happy." ➜ John said (that) he was happy.</li>
                                <li>"I don't like broccoli." ➜ Maria said (that) she didn't like broccoli.</li>
                                <li>"The train is late." ➜ The traveler said (that) the train was late.</li>
                                <li>"I'll be there." ➜ He said he would be there.</li>
                                <li>"It's sunny." ➜ She said it was sunny.</li>
                                <li>"We need help." ➜ They said they needed help.</li>
                            </ul>
                        </div>
                        <div className="p-6 bg-indigo-50 rounded-xl border border-indigo-100">
                            <h3 className="font-bold text-lg mb-4 text-indigo-800">Tell (Objeto requerido)</h3>
                            <ul className="space-y-3 text-sm text-slate-700">
                                <li>"I will call you." ➜ He told <strong>me</strong> that he would call me.</li>
                                <li>"You look great." ➜ She told <strong>him</strong> that he looked great.</li>
                                <li>"Clean your room." ➜ My mom told <strong>us</strong> to clean our room.</li>
                                <li>"Don't cry." ➜ She told <strong>me</strong> not to cry.</li>
                                <li>"I love this." ➜ He told <strong>her</strong> he loved that.</li>
                                <li>"They are coming." ➜ They told <strong>us</strong> they were coming.</li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div className="bg-white p-8 rounded-card shadow-sm border border-indigo-100">
                    <h2 className="text-2xl font-bold mb-6 text-indigo-600">Other Reporting Verbs</h2>
                    <div className="grid md:grid-cols-2 gap-4">
                        {[
                            { verb: 'Add', ex1: '"I\'ll arrive at 8," he added.', ex2: 'He added that he would arrive at 8.' },
                            { verb: 'Answer', ex1: '"No," she answered.', ex2: 'She answered that she wouldn\'t.' },
                            { verb: 'Ask', ex1: '"Are you okay?" she asked.', ex2: 'She asked if I was okay.' },
                            { verb: 'Claim', ex1: '"I\'m the winner," he claimed.', ex2: 'He claimed that he was the winner.' },
                            { verb: 'Cry', ex1: '"I\'m lost!" he cried.', ex2: 'He cried that he was lost.' },
                            { verb: 'Demand', ex1: '"Give me the money!" he demanded.', ex2: 'He demanded that I give him the money.' },
                            { verb: 'Explain', ex1: '"I\'m busy," he explained.', ex2: 'He explained that he was busy.' },
                            { verb: 'Instruct', ex1: '"Open your books," he instructed.', ex2: 'He instructed us to open our books.' },
                            { verb: 'Mention', ex1: '"I\'m going home," he mentioned.', ex2: 'He mentioned that he was going home.' },
                            { verb: 'Suggest', ex1: '"Let\'s dance," she suggested.', ex2: 'She suggested that we dance.' }
                        ].map((item, idx) => (
                            <div key={idx} className="p-4 bg-slate-50 rounded-lg border border-slate-200">
                                <h4 className="font-bold text-indigo-700 mb-1">{item.verb}</h4>
                                <p className="text-xs text-slate-500 italic mb-1">Direct: {item.ex1}</p>
                                <p className="text-xs text-indigo-800 font-semibold">Reported: {item.ex2}</p>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );

        const TimeExpressions = () => {
            const data = [
                { direct: "Ago", reported: "Before", directEx: "I met him 2 days ago", reportedEx: "She said she had met him 2 days before" },
                { direct: "Bring", reported: "Take", directEx: "Bring me the book", reportedEx: "He told me to take him the book" },
                { direct: "Come", reported: "Go", directEx: "Come here!", reportedEx: "She told me to go there" },
                { direct: "Here", reported: "There", directEx: "I'll have lunch here", reportedEx: "She said she would have lunch there" },
                { direct: "Last night", reported: "The night before", directEx: "I went out last night", reportedEx: "He said he had gone out the night before" },
                { direct: "Last week", reported: "The week before", directEx: "I finished it last week", reportedEx: "He said he had finished it the week before" },
                { direct: "Next week", reported: "The week after", directEx: "I'll travel next week", reportedEx: "She said she would travel the following week" },
                { direct: "Next year", reported: "The following year", directEx: "I will move next year", reportedEx: "He said he would move the following year" },
                { direct: "Now", reported: "Then", directEx: "They don't want to sell now", reportedEx: "They said they didn't want to sell then" },
                { direct: "These", reported: "Those", directEx: "I like these shoes", reportedEx: "She said she liked those shoes" },
                { direct: "This", reported: "That", directEx: "I love this song", reportedEx: "He said he loved that song" },
                { direct: "This week", reported: "That week", directEx: "I am busy this week", reportedEx: "She said she was busy that week" },
                { direct: "Thus", reported: "So", directEx: "It happened thus", reportedEx: "He explained it happened so" },
                { direct: "Today", reported: "That day", directEx: "I am busy today", reportedEx: "He said he was busy that day" },
                { direct: "Tomorrow", reported: "The next day", directEx: "You can't leave tomorrow", reportedEx: "They said we couldn't leave the next day" },
                { direct: "Tonight", reported: "That night", directEx: "I'm going out tonight", reportedEx: "She said she was going out that night" },
                { direct: "Yesterday", reported: "The day before or the previous day", directEx: "I called him yesterday", reportedEx: "He said he had called him the day before" }
            ];

            return (
                <section>
                    <h2 className="text-2xl font-bold mb-6 text-indigo-600">3. Cambios en Tiempo y Lugar</h2>
                    <div className="grid gap-4">
                        {data.map((item, idx) => (
                            <div key={idx} className="bg-white p-5 rounded-lg border border-slate-200 shadow-sm">
                                <div className="flex justify-between items-center mb-3">
                                    <span className="font-bold text-slate-500">{item.direct}</span>
                                    <span className="text-indigo-600 font-bold">➜ {item.reported}</span>
                                </div>
                                <div className="text-xs bg-slate-50 p-3 rounded space-y-1">
                                    <span className="block text-slate-500 italic">Direct: "{item.directEx}"</span>
                                    <span className="block font-semibold text-indigo-800">Reported: {item.reportedEx}</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

        const PronounsSection = () => (
            <section className="space-y-8">
                <h2 className="text-2xl font-bold text-indigo-600">4. Pronouns may also change</h2>
                
                <div className="bg-white p-6 rounded-card border border-slate-200">
                    <h3 className="text-xl font-bold mb-3 text-indigo-800">Pronombres Personales (Personal Pronouns)</h3>
                    <p className="mb-4 text-sm text-slate-600">Son los que sustituyen al sujeto de la oración, es decir, quién realiza la acción. En el Reported Speech, cambian para reflejar correctamente quién está realizando la acción desde la perspectiva del nuevo narrador.</p>
                    <table className="w-full text-left border-collapse bg-white">
                        <thead><tr className="bg-indigo-50"><th className="p-2">Direct</th><th className="p-2">Reported</th></tr></thead>
                        <tbody>
                            <tr><td className="p-2 border-t">I</td><td className="p-2 border-t font-semibold">She / He</td></tr>
                            <tr><td className="p-2 border-t">You</td><td className="p-2 border-t font-semibold">I / We</td></tr>
                            <tr><td className="p-2 border-t">We</td><td className="p-2 border-t font-semibold">They</td></tr>
                            <tr><td className="p-2 border-t">They</td><td className="p-2 border-t font-semibold">They / She</td></tr>
                            <tr><td className="p-2 border-t">She</td><td className="p-2 border-t font-semibold">She / You</td></tr>
                            <tr><td className="p-2 border-t">He</td><td className="p-2 border-t font-semibold">He / You</td></tr>
                            <tr><td className="p-2 border-t">It</td><td className="p-2 border-t font-semibold">It</td></tr>
                        </tbody>
                    </table>
                </div>

                <div className="bg-white p-6 rounded-card border border-slate-200">
                    <h3 className="text-xl font-bold mb-3 text-indigo-800">Pronombres Posesivos (Possessive)</h3>
                    <p className="mb-4 text-sm text-slate-600">Indican pertenencia. Al informar algo de alguien más, la relación de propiedad debe ajustarse: si alguien dijo "mi coche", el narrador dirá "su coche" (de él o de ella).</p>
                    <table className="w-full text-left border-collapse bg-white">
                        <thead><tr className="bg-indigo-50"><th className="p-2">Direct</th><th className="p-2">Reported</th></tr></thead>
                        <tbody>
                            <tr><td className="p-2 border-t">My</td><td className="p-2 border-t font-semibold">His / Her</td></tr>
                            <tr><td className="p-2 border-t">Your</td><td className="p-2 border-t font-semibold">My / Our</td></tr>
                            <tr><td className="p-2 border-t">Our</td><td className="p-2 border-t font-semibold">Our / Their</td></tr>
                            <tr><td className="p-2 border-t">Their</td><td className="p-2 border-t font-semibold">Their / You</td></tr>
                            <tr><td className="p-2 border-t">Her</td><td className="p-2 border-t font-semibold">Her / Your</td></tr>
                            <tr><td className="p-2 border-t">His</td><td className="p-2 border-t font-semibold">His / Your</td></tr>
                            <tr><td className="p-2 border-t">Its</td><td className="p-2 border-t font-semibold">Its</td></tr>
                        </tbody>
                    </table>
                </div>

                <div className="bg-white p-6 rounded-card border border-slate-200">
                    <h3 className="text-xl font-bold mb-3 text-indigo-800">Pronombres Objeto (Object Pronouns)</h3>
                    <p className="mb-4 text-sm text-slate-600">Estos pronombres sustituyen a quien recibe la acción del verbo. Deben cambiarse para concordar con la persona a la que se refiere el nuevo narrador.</p>
                    <table className="w-full text-left border-collapse bg-white">
                        <thead><tr className="bg-indigo-50"><th className="p-2">Direct</th><th className="p-2">Reported</th></tr></thead>
                        <tbody>
                            <tr><td className="p-2 border-t">Me</td><td className="p-2 border-t font-semibold">Her / Him</td></tr>
                            <tr><td className="p-2 border-t">You</td><td className="p-2 border-t font-semibold">Me / Us</td></tr>
                            <tr><td className="p-2 border-t">Us</td><td className="p-2 border-t font-semibold">Us / Them</td></tr>
                            <tr><td className="p-2 border-t">Them</td><td className="p-2 border-t font-semibold">Them / You</td></tr>
                            <tr><td className="p-2 border-t">Her</td><td className="p-2 border-t font-semibold">Her / You</td></tr>
                            <tr><td className="p-2 border-t">Him</td><td className="p-2 border-t font-semibold">Him / You</td></tr>
                            <tr><td className="p-2 border-t">It</td><td className="p-2 border-t font-semibold">It</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        );

        const ReportedQuestions = () => (
            <section className="space-y-6">
                <h2 className="text-2xl font-bold text-emerald-600">5. Reported Questions</h2>
                
                <div className="bg-white p-6 rounded-card border border-emerald-100 shadow-sm">
                    <h3 className="font-bold text-lg mb-2 text-emerald-800">Estructura y Auxiliares</h3>
                    <p className="text-slate-600 text-sm mb-4">
                        Las <em>Reported Questions</em> relatan una pregunta realizada por alguien. Por lo tanto, <strong>no son preguntas directas</strong>. Esto significa que debemos eliminar los auxiliares interrogativos (do, does, did) y estructurar la frase como una afirmación (Sujeto + Verbo).
                    </p>
                    <div className="p-4 bg-emerald-50 rounded-lg italic text-emerald-900 font-medium">
                        Direct: "Where <strong>do</strong> you usually watch TV?" <br/>
                        Reported: He asked me where I usually <strong>watched</strong> TV.
                    </div>
                </div>

                <div className="bg-white p-6 rounded-card border border-emerald-100 shadow-sm">
                    <h3 className="font-bold text-lg mb-2 text-emerald-800">Wanted to Know</h3>
                    <p className="text-slate-600 text-sm mb-4">
                        Puedes usar el verbo <em>asked</em> o la frase <em>wanted to know</em> para introducir estas preguntas.
                    </p>
                    <ul className="list-disc pl-5 space-y-2 text-sm text-slate-700">
                        <li>"How <strong>does</strong> he do that?" ➜ She wanted to know how he <strong>did</strong> it.</li>
                        <li>"How long <strong>have</strong> you been here?" ➜ He wanted to know how long he <strong>had been</strong> there.</li>
                    </ul>
                </div>

                <div className="bg-white p-6 rounded-card border border-emerald-100 shadow-sm">
                    <h3 className="font-bold text-lg mb-2 text-emerald-800">Yes / No Questions (If / Whether)</h3>
                    <p className="text-slate-600 text-sm mb-4">
                        Cuando no hay una palabra interrogativa (who, when, where), usamos <em>if</em> o <em>whether</em> para introducir la pregunta reportada.
                    </p>
                    <ul className="list-disc pl-5 space-y-2 text-sm text-slate-700">
                        <li>"<strong>Do</strong> you like the advert?" ➜ He wanted to know <strong>if</strong> I liked the advert.</li>
                        <li>"<strong>Is</strong> he going to retire soon?" ➜ She asked <strong>whether</strong> he was going to retire soon.</li>
                    </ul>
                </div>

                <div className="bg-white p-6 rounded-card border border-emerald-100 shadow-sm">
                    <h3 className="font-bold text-lg mb-2 text-emerald-800">El verbo "To Be" al final</h3>
                    <p className="text-slate-600 text-sm mb-4">
                        Si el verbo principal es <em>to be</em>, movemos el verbo al final de la oración reportada.
                    </p>
                    <div className="space-y-4">
                        <div className="p-4 bg-emerald-50 rounded-lg italic text-emerald-900 font-medium">
                            "Where <strong>is</strong> he?" ➜ She asked where he <strong>was</strong>.
                        </div>
                        <div className="p-4 bg-emerald-50 rounded-lg italic text-emerald-900 font-medium">
                            "What <strong>is</strong> the problem?" ➜ We wanted to know what the problem <strong>was</strong>.
                        </div>
                    </div>
                </div>
            </section>
        );

        const PracticeSection = () => {
            const exercises = [
                { q: 'The boy asked the tour guide, "Where is the main tourist office?"', a: 'the boy asked the tour guide where the main tourist office was' },
                { q: 'The police officer said, "Get out of the car!"', a: 'the police officer ordered the boys to get out of the car' },
                { q: 'The woman asked, "How long have you worked as a tour guide?"', a: 'the woman wanted to know how long i had worked as a tour guide' },
                { q: 'He said, "Come to me!"', a: 'he told me to go to him' },
                { q: 'I asked the waiter, "When is dinner served?"', a: 'i asked the waiter when dinner was served' },
                { q: 'The doctor told me, "You should cut down on your smoking."', a: 'the doctor told me i should cut down on my smoking' },
                { q: 'He asked me, "Do you understand all the rules?"', a: 'he asked me if i understood all the rules' },
                { q: 'She asked me, "When will I see you again?"', a: 'she asked me when she would see me again' },
                { q: 'My parents said, "We are going on holiday tomorrow."', a: 'my parents said that they were going on holiday the next day' },
                { q: 'She said, "Wait until I get back!"', a: 'she told him to wait until she got back' },
                { q: 'My sister said, "I always eat lots of fresh fruit and salad."', a: 'my sister said that she always ate lots of fresh fruit and salad' },
                { q: 'The workers said, "We won\'t have enough time to finish the job."', a: 'the workers said that they wouldn\'t have enough time to finish the job' },
                { q: 'The passenger asked, "Could someone help me with the luggage?"', a: 'the passengers asked if someone could help them with the luggage' },
                { q: 'Mom said, "Don\'t worry!"', a: 'mom told me not to worry' },
                { q: 'Jack said, "We must leave soon."', a: 'jack said that they had to leave soon' }
            ];

            const [idx, setIdx] = useState(0);
            const [input, setInput] = useState('');
            const [feedback, setFeedback] = useState(null);

            const check = () => {
                if(input.trim().toLowerCase() === exercises[idx].a) {
                    setFeedback({ status: 'correct', msg: '¡Excelente! Has aplicado bien las reglas.' });
                } else {
                    setFeedback({ status: 'wrong', msg: `No es del todo correcto. Intenta analizar el cambio de tiempo o pronombre. La respuesta esperada es: "${exercises[idx].a}"` });
                }
            };

            return (
                <div className="bg-slate-900 text-white p-8 rounded-card">
                    <h2 className="text-2xl font-bold mb-6 text-indigo-400">Práctica Interactiva</h2>
                    <div className="p-6 bg-slate-800 rounded-xl mb-4">
                        <p className="text-lg mb-4 text-indigo-200">Ejercicio {idx + 1} de {exercises.length}</p>
                        <p className="text-xl font-medium mb-6">{exercises[idx].q}</p>
                        <input 
                            className="w-full p-3 text-slate-900 rounded-lg border-2 border-indigo-500 focus:outline-none mb-4"
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            placeholder="Escribe el reported speech aquí..."
                        />
                        <button onClick={check} className="bg-indigo-600 hover:bg-indigo-500 px-6 py-2 rounded-full font-bold transition-all">Comprobar</button>
                    </div>
                    {feedback && (
                        <div className={`p-4 rounded-lg mt-4 ${feedback.status === 'correct' ? 'bg-emerald-600' : 'bg-rose-600'}`}>
                            {feedback.msg}
                            {feedback.status === 'correct' && (
                                <button onClick={() => {setIdx((idx+1)%exercises.length); setInput(''); setFeedback(null)}} className="ml-4 underline font-bold">Siguiente ejercicio</button>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
