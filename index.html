<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastering Reported Speech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .rounded-card { border-radius: 1.5rem; }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-12">

    <div id="root" class="max-w-5xl mx-auto p-4 md:p-8">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-extrabold text-indigo-700 mb-2">Reported Speech Academy</h1>
            <p class="text-lg text-slate-600">Tu plataforma de estudio definitiva.</p>
        </header>

        <nav id="navbar" class="flex flex-wrap gap-2 mb-8 justify-center">
        </nav>

        <main id="main-content" class="min-h-[500px]">
        </main>
    </div>

    <script>
        let activeSection = 'tense';
        let currentIndex = 0;

        const navItems = [
            { id: 'tense', label: '1. Backshifting' },
            { id: 'saytell', label: '2. Say vs Tell' },
            { id: 'time', label: '3. Time & Place' },
            { id: 'pronouns', label: '4. Pronouns' },
            { id: 'questions', label: '5. Reported Questions' },
            { id: 'practice', label: 'Práctica' }
        ];

        const exercises = [
            { q: 'The boy asked the tour guide, "Where is the main tourist office?"', a: 'the boy asked the tour guide where the main tourist office was' },
            { q: 'The police officer said, "Get out of the car!"', a: 'the police officer ordered the boys to get out of the car' },
            { q: 'The woman asked, "How long have you worked as a tour guide?"', a: 'the woman wanted to know how long i had worked as a tour guide' },
            { q: 'He said, "Come to me!"', a: 'he told me to go to him' },
            { q: 'I asked the waiter, "When is dinner served?"', a: 'i asked the waiter when dinner was served' },
            { q: 'The doctor told me, "You should cut down on your smoking."', a: 'the doctor told me i should cut down on my smoking' },
            { q: 'He asked me, "Do you understand all the rules?"', a: 'he asked me if i understood all the rules' },
            { q: 'She asked me, "When will I see you again?"', a: 'she asked me when she would see me again' },
            { q: 'My parents said, "We are going on holiday tomorrow."', a: 'my parents said that they were going on holiday the next day' },
            { q: 'She said, "Wait until I get back!"', a: 'she told him to wait until she got back' },
            { q: 'My sister said, "I always eat lots of fresh fruit and salad."', a: 'my sister said that she always ate lots of fresh fruit and salad' },
            { q: 'The workers said, "We won\'t have enough time to finish the job."', a: 'the workers said that they wouldn\'t have enough time to finish the job' },
            { q: 'The passengers asked, "Could someone help me with the luggage?"', a: 'the passengers asked if someone could help them with the luggage' },
            { q: 'Mom said, "Don\'t worry!"', a: 'mom told me not to worry' },
            { q: 'Jack said, "We must leave soon."', a: 'jack said that they had to leave soon' }
        ];

        function renderSection(content) {
            document.getElementById('main-content').innerHTML = content;
        }

        function handleCheck() {
            const input = document.getElementById('practice-input').value.trim().toLowerCase();
            const feedback = document.getElementById('feedback');
            const correctAnswer = exercises[currentIndex].a;

            if (input === correctAnswer) {
                feedback.innerHTML = `
                    <div class="p-4 bg-emerald-600 rounded-lg text-white mt-4 shadow-lg">
                        <p class="font-bold">¡Excelente! Respuesta correcta.</p>
                        <button onclick="nextQuestion()" class="underline font-semibold mt-2">Siguiente ejercicio →</button>
                    </div>
                `;
            } else {
                feedback.innerHTML = `
                    <div class="p-4 bg-rose-600 rounded-lg text-white mt-4 shadow-lg">
                        <p class="font-bold">¡Incorrecto! Inténtalo de nuevo.</p>
                        <button onclick="revealAnswer()" class="text-sm underline mt-2 font-semibold">Ver respuesta correcta</button>
                    </div>
                `;
            }
        }

        function revealAnswer() {
            const feedback = document.getElementById('feedback');
            feedback.innerHTML = `
                <div class="p-4 bg-amber-600 rounded-lg text-white mt-4">
                    <p class="font-bold mb-1">La respuesta correcta era:</p>
                    <p class="italic font-mono text-sm">"${exercises[currentIndex].a}"</p>
                    <button onclick="nextQuestion()" class="mt-4 underline font-bold">Siguiente ejercicio →</button>
                </div>
            `;
        }

        function nextQuestion() {
            currentIndex = (currentIndex + 1) % exercises.length;
            renderApp();
        }

        function renderTenseChanges() {
            const items = [
                { dir: '"I want a holiday"', rep: 'She told me she wanted a holiday', exp: 'Present Simple → Past Simple' },
                { dir: '"Bob is annoying me"', rep: 'Jane said Bob was annoying her', exp: 'Present Continuous → Past Continuous' },
                { dir: '"I have eaten too much"', rep: 'He said he had eaten too much', exp: 'Present Perfect → Past Perfect' },
                { dir: '"The class has been interesting"', rep: 'Anne said the class had been interesting', exp: 'Present Perfect Continuous → Past Perfect Continuous' },
                { dir: '"I saw her arrive"', rep: 'He told me he had seen her arrive', exp: 'Past Simple → Past Perfect' },
                { dir: '"The team were playing well"', rep: 'John said the team had been playing well', exp: 'Past Continuous → Past Perfect Continuous' },
                { dir: '"I had arrived before 9am"', rep: 'She said she had arrived before 9am', exp: 'Past Perfect → No change' },
                { dir: '"We had already been dating for 3 years"', rep: 'Mick told me they had already been dating for 3 years', exp: 'Past Perfect Continuous → No change' },
                { dir: '"I will take you out tonight"', rep: 'He said he would take me out tonight', exp: 'Will → Would' },
                { dir: '"I can easily pass the test"', rep: 'She said she could easily pass the test', exp: 'Can → Could' },
                { dir: '"You must leave immediately"', rep: 'He told me I had to leave immediately', exp: 'Must → Had to' },
                { dir: '"We may go out later"', rep: 'She said they might go out later', exp: 'May → Might' },
                { dir: '"You ought to come at 7pm"', rep: 'He told me I ought to come at 7pm', exp: 'Ought to → No change' },
                { dir: '"I should have helped you"', rep: 'He said he should have helped me', exp: 'Should → No change' },
                { dir: '"I would walk the dog at night"', rep: 'She said she would walk the dog at night', exp: 'Would → No change' },
                { dir: '"You couldn\'t do it"', rep: 'He told me I couldn\'t do it', exp: 'Could → No change' },
                { dir: '"I might arrive late"', rep: 'He said he might arrive late', exp: 'Might → No change' }
            ];

            return `
                <section>
                    <h2 class="text-3xl font-bold mb-6 text-indigo-700">1. Backshifting: Cambio de tiempos</h2>
                    <div class="bg-indigo-50 p-6 rounded-card border border-indigo-100 mb-8">
                        <h3 class="font-bold text-indigo-800 text-lg mb-2">¿Qué es el Reported Speech?</h3>
                        <p class="text-slate-700 text-sm mb-4 leading-relaxed">Es la herramienta que usamos para contar lo que alguien más dijo sin citar sus palabras exactas. Al reportar una acción que ocurrió en el pasado, debemos ajustar el tiempo verbal hacia atrás ("Backshifting") para mantener la coherencia temporal.</p>
                    </div>
                    <div class="space-y-4">
                        ${items.map(item => `
                            <div class="bg-white p-4 rounded-xl border-l-4 border-indigo-500 shadow-sm">
                                <div class="grid md:grid-cols-2 gap-4 text-sm">
                                    <div><span class="font-bold text-indigo-600 block">Direct:</span> <span class="italic text-slate-600">${item.dir}</span></div>
                                    <div><span class="font-bold text-indigo-600 block">Reported:</span> <span class="text-slate-800">${item.rep}</span></div>
                                </div>
                                <div class="mt-2 text-xs font-mono bg-slate-100 px-2 py-1 inline-block rounded text-slate-500">${item.exp}</div>
                            </div>
                        `).join('')}
                    </div>
                </section>
            `;
        }

        function renderSayTell() {
            const otherVerbs = [
                { v: 'Add', dir: '"I\'ll arrive at 8," he added.', rep: 'He added that he would arrive at 8.' },
                { v: 'Answer', dir: '"No," she answered.', rep: 'She answered that she wouldn\'t.' },
                { v: 'Ask', dir: '"Are you okay?" she asked.', rep: 'She asked if I was okay.' },
                { v: 'Claim', dir: '"I\'m the winner," he claimed.', rep: 'He claimed that he was the winner.' },
                { v: 'Cry', dir: '"I\'m lost!" he cried.', rep: 'He cried that he was lost.' },
                { v: 'Demand', dir: '"Give me the money!" he demanded.', rep: 'He demanded that I give him the money.' },
                { v: 'Explain', dir: '"I\'m busy," he explained.', rep: 'He explained that he was busy.' },
                { v: 'Instruct', dir: '"Open your books," he instructed.', rep: 'He instructed us to open our books.' },
                { v: 'Mention', dir: '"I\'m going home," he mentioned.', rep: 'He mentioned that he was going home.' },
                { v: 'Suggest', dir: '"Let\'s dance," she suggested.', rep: 'He suggested that we dance.' }
            ];

            return `
                <section class="space-y-8">
                    <h2 class="text-3xl font-bold mb-6 text-indigo-700">2. Say vs Tell</h2>
                    <div class="bg-white p-6 rounded-card border border-slate-200 shadow-sm">
                        <p class="text-slate-700 mb-6">Usamos <strong>said</strong> y <strong>told</strong>. <strong>Said</strong> no requiere objeto. <strong>Told</strong> SIEMPRE requiere un objeto (me, him, her...).</p>
                        
                        <div class="grid md:grid-cols-2 gap-8">
                            <div class="p-6 bg-slate-50 rounded-xl border border-slate-200">
                                <h3 class="font-bold text-lg mb-4 text-indigo-800">Say (Sin objeto)</h3>
                                <ul class="space-y-3 text-sm text-slate-700">
                                    <li>"I am happy." ➜ John said he was happy.</li>
                                    <li>"I like pizza." ➜ He said he liked pizza.</li>
                                    <li>"It's late." ➜ She said it was late.</li>
                                </ul>
                            </div>
                            <div class="p-6 bg-indigo-50 rounded-xl border border-indigo-100">
                                <h3 class="font-bold text-lg mb-4 text-indigo-800">Tell (Con objeto)</h3>
                                <ul class="space-y-3 text-sm text-slate-700">
                                    <li>"I will call." ➜ He told me he would call.</li>
                                    <li>"You look great." ➜ She told him he looked great.</li>
                                    <li>"It's ready." ➜ She told them it was ready.</li>
                                </ul>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-card border border-slate-200 shadow-sm">
                        <h3 class="font-bold text-xl mb-6 text-indigo-800">Other Reporting Verbs</h3>
                        <div class="space-y-4">
                            ${otherVerbs.map(item => `
                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 text-sm">
                                    <span class="font-bold text-indigo-600">${item.v}</span>
                                    <div class="grid md:grid-cols-2 gap-4 mt-2 italic text-slate-600">
                                        <span>Direct: ${item.dir}</span>
                                        <span>Reported: ${item.rep}</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </section>
            `;
        }

        function renderTimeExpressions() {
            const items = [
                { d: "Ago", i: "Before", ex: "I visited him two years ago.", re: "I said I had visited him two years before." },
                { d: "Bring", i: "Take", ex: "Bring me the book.", re: "He told me to take him the book." },
                { d: "Come", i: "Go", ex: "Come to my party.", re: "He invited me to go to his party." },
                { d: "Here", i: "There", ex: "I work here.", re: "He said he worked there." },
                { d: "Last night", i: "The night before", ex: "I went out last night.", re: "He said he had gone out the night before." },
                { d: "Last week", i: "The week before", ex: "I was busy last week.", re: "He said he had been busy the week before." },
                { d: "Next week", i: "The week after", ex: "I will travel next week.", re: "He said he would travel the week after." },
                { d: "Next year", i: "The following year", ex: "I'll graduate next year.", re: "He said he'd graduate the following year." },
                { d: "Now", i: "Then", ex: "I am eating now.", re: "He said he was eating then." },
                { d: "These", i: "Those", ex: "I like these shoes.", re: "He said he liked those shoes." },
                { d: "This", i: "That", ex: "This is my house.", re: "He said that was his house." },
                { d: "This week", i: "That week", ex: "I'm working this week.", re: "He said he was working that week." },
                { d: "Thus", i: "So", ex: "It is thus.", re: "He said it was so." },
                { d: "Today", i: "That day", ex: "I'm busy today.", re: "He said he was busy that day." },
                { d: "Tomorrow", i: "The next day", ex: "I'll go tomorrow.", re: "He said he'd go the next day." },
                { d: "Tonight", i: "That night", ex: "I'll study tonight.", re: "He said he'd study that night." },
                { d: "Yesterday", i: "The day before", ex: "I arrived yesterday.", re: "He said he had arrived the day before." }
            ];

            return `
                <section>
                    <h2 class="text-3xl font-bold mb-6 text-indigo-700">3. Time & Place</h2>
                    <div class="bg-indigo-50 p-6 rounded-card border border-indigo-100 mb-8">
                        <p class="text-slate-700 text-sm leading-relaxed">
                            El cambio de palabras de tiempo y lugar ocurre porque el marco de referencia del emisor original ("hoy aquí") ya no coincide con el del reportero ("ayer allí"). Al contar la historia desde otro contexto, debemos ajustar estas palabras para mantener la veracidad temporal y espacial.
                        </p>
                    </div>
                    <div class="grid md:grid-cols-2 gap-4">
                        ${items.map(item => `
                            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm text-sm">
                                <p class="text-indigo-600 font-bold mb-1">${item.d} ➜ ${item.i}</p>
                                <p class="text-slate-600 italic">"${item.ex}" ➜ ${item.re}</p>
                            </div>
                        `).join('')}
                    </div>
                </section>
            `;
        }

        function renderPronouns() {
            return `
                <section class="space-y-8">
                    <h2 class="text-3xl font-bold mb-6 text-indigo-700">4. Pronouns</h2>
                    
                    <div class="bg-white p-6 rounded-card border border-slate-200 shadow-sm">
                        <h3 class="text-xl font-bold mb-4 text-indigo-800">Personal Pronouns</h3>
                        <p class="mb-4 text-slate-600">Sustituyen al sujeto. Cambian al reportar porque la persona que realiza la acción suele ser distinta al emisor original.</p>
                        <div class="grid grid-cols-2 gap-2 text-sm font-mono bg-slate-50 p-4 rounded-lg">
                            <span>I ➜ she/he</span> <span>You ➜ I/we</span> <span>We ➜ we/they</span> <span>They ➜ they/you</span> <span>She ➜ she/you</span> <span>He ➜ he/you</span> <span>It ➜ it</span>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-card border border-slate-200 shadow-sm">
                        <h3 class="text-xl font-bold mb-4 text-indigo-800">Possessive Pronouns</h3>
                        <p class="mb-4 text-slate-600">Indican posesión. Se ajustan según quién es el dueño del objeto desde la nueva perspectiva del narrador.</p>
                        <div class="grid grid-cols-2 gap-2 text-sm font-mono bg-slate-50 p-4 rounded-lg">
                            <span>My ➜ his/her</span> <span>Your ➜ my/our</span> <span>Our ➜ our/their</span> <span>Their ➜ their/you</span> <span>Her ➜ her/you</span> <span>His ➜ his/you</span> <span>Its ➜ its</span>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-card border border-slate-200 shadow-sm">
                        <h3 class="text-xl font-bold mb-4 text-indigo-800">Object Pronouns</h3>
                        <p class="mb-4 text-slate-600">Reciben la acción. Cambian cuando el receptor de la acción es distinto al original.</p>
                        <div class="grid grid-cols-2 gap-2 text-sm font-mono bg-slate-50 p-4 rounded-lg">
                            <span>Me ➜ her/him</span> <span>You ➜ me/us</span> <span>Us ➜ us/them</span> <span>Them ➜ them/you</span> <span>Her ➜ her/you</span> <span>Him ➜ him/you</span> <span>It ➜ it</span>
                        </div>
                    </div>
                </section>
            `;
        }

        function renderQuestions() {
            return `
                <section class="space-y-6">
                    <h2 class="text-3xl font-bold mb-6 text-indigo-700">5. Reported Questions</h2>
                    <div class="bg-white p-6 rounded-card border border-slate-200 shadow-sm space-y-6">
                        <div class="p-4 bg-indigo-50 rounded-lg">
                            <h4 class="font-bold text-indigo-800 mb-2">1. Estructura normal</h4>
                            <p class="text-sm text-slate-700 mb-2">Las reported questions NO llevan auxiliares (do/does/did). Siguen el orden Afirmativo.</p>
                            <p class="text-sm font-medium text-slate-800">"Where do you live?" ➜ <strong>He asked me where I lived.</strong></p>
                        </div>

                        <div class="p-4 bg-slate-50 rounded-lg">
                            <h4 class="font-bold text-indigo-800 mb-2">2. If / Whether</h4>
                            <p class="text-sm text-slate-700 mb-2">Si es pregunta Yes/No, usamos "if" o "whether".</p>
                            <p class="text-sm font-medium text-slate-800">"Do you like it?" ➜ <strong>He wanted to know if I liked it.</strong></p>
                        </div>

                        <div class="p-4 bg-indigo-50 rounded-lg">
                            <h4 class="font-bold text-indigo-800 mb-2">3. El verbo "Be" al final</h4>
                            <p class="text-sm text-slate-700 mb-2">Si el verbo principal es "be", este se mueve al final.</p>
                            <p class="text-sm font-medium text-slate-800">"Where is the problem?" ➜ <strong>We wanted to know what the problem was.</strong></p>
                        </div>
                    </div>
                </section>
            `;
        }

        function renderPractice() {
            return `
                <div class="bg-slate-900 text-white p-8 rounded-card">
                    <h2 class="text-2xl font-bold mb-6 text-indigo-400">Práctica (Ejercicio ${currentIndex + 1})</h2>
                    <div class="p-6 bg-slate-800 rounded-xl mb-4">
                        <p class="text-xl font-medium mb-6 italic">"${exercises[currentIndex].q}"</p>
                        <input id="practice-input" class="w-full p-3 text-slate-900 rounded-lg border-2 border-indigo-500 focus:outline-none mb-4" placeholder="Escribe aquí tu respuesta...">
                        <button onclick="handleCheck()" class="bg-indigo-600 hover:bg-indigo-500 px-6 py-2 rounded-full font-bold">Comprobar</button>
                    </div>
                    <div id="feedback"></div>
                </div>
            `;
        }

        function renderApp() {
            const nav = document.getElementById('navbar');
            nav.innerHTML = navItems.map(item => `
                <button
                    onclick="activeSection = '${item.id}'; currentIndex = 0; renderApp();"
                    class="px-4 py-2 rounded-full font-medium transition-all ${activeSection === item.id ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white text-slate-600 border border-slate-200 hover:border-indigo-300'}"
                >
                    ${item.label}
                </button>
            `).join('');

            switch(activeSection) {
                case 'tense': renderSection(renderTenseChanges()); break;
                case 'saytell': renderSection(renderSayTell()); break;
                case 'time': renderSection(renderTimeExpressions()); break;
                case 'pronouns': renderSection(renderPronouns()); break;
                case 'questions': renderSection(renderQuestions()); break;
                case 'practice': renderSection(renderPractice()); break;
            }
        }

        renderApp();
    </script>
</body>
</html>
